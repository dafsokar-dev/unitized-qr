<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unitized QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    text-align:center;
    margin:30px;
}

button{
    width:280px;
    padding:16px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#1976D2;
    color:white;
    cursor:pointer;
}

#reader{
    width:350px;
    margin:25px auto;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>📷 Unitized QR Scanner</h1>

<button onclick="startScanner()">
פתח מצלמה
</button>

<div id="reader"></div>

<div id="result"></div>

<script>

let scanner = null;

function startScanner(){

    document.getElementById("result").innerHTML = "";

    if(scanner){
        scanner.clear().catch(()=>{});
    }

    scanner = new Html5Qrcode("reader");

    scanner.start(

        { facingMode:"environment" },

        {
            fps:10,
            qrbox:250
        },

        function(decodedText){

            scanner.stop().then(function(){

                document.getElementById("result").innerHTML =
                    "✅ QR נקרא:<br><br><b>"+decodedText+"</b>";

            });

        },

        function(error){

            // מתעלמים

        }

    ).catch(function(err){

        document.getElementById("result").innerHTML =
            "❌ "+err;

    });

}

</script>

</body>
</html>
