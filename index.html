<!DOCTYPE html>
<html lang="he">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unitized QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

button{
    width:280px;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:#1976D2;
    color:white;
    cursor:pointer;
}

#reader{
    width:340px;
    margin:25px auto;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>📷 Unitized QR Scanner</h1>

<button id="startButton">
פתח מצלמה
</button>

<div id="reader"></div>

<div id="result"></div>

<script>

let html5QrCode = null;
let started = false;

document.getElementById("startButton").addEventListener("click", startScanner);

async function startScanner(){

    if(started){
        return;
    }

    started = true;

    document.getElementById("result").innerHTML = "";

    html5QrCode = new Html5Qrcode("reader");

    try{

        await html5QrCode.start(

            {
                facingMode:"environment"
            },

            {
                fps:10,
                qrbox:{
                    width:250,
                    height:250
                }
            },

            onScanSuccess

        );

    }

    catch(err){

        started = false;

        document.getElementById("result").innerHTML =
        "❌ " + err;

    }

}

async function onScanSuccess(decodedText){

    document.getElementById("result").innerHTML =
    "פותח את האפליקציה...";

    try{

        await html5QrCode.stop();

    }catch(e){}

    alert(
  "https://script.google.com/macros/s/AKfycbwZ5FblfzjMXbZUeb0ZRLbpnIRWpK3fULj5kiUbJyzzlvjVUba51zKF0ceATs_KDFCH/exec?unit="
  + decodedText
);

}

</script>

</body>
</html>
