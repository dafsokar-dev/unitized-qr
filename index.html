<!DOCTYPE html>
<html lang="he">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Unitized QR</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>

body{

    font-family:Arial;
    background:#f4f4f4;
    text-align:center;
    margin-top:60px;
      
}

button{

    width:300px;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:#1976D2;
    color:white;
    cursor:pointer;

}

#result{

    margin-top:30px;
    font-size:22px;
    font-weight:bold;

}

</style>

</head>

<body>

<h1>📷 Unitized QR Scanner</h1>
<h2>גרסה 2</h2>
<button onclick="test()">

פתח מצלמה

</button>

<div id="result"></div>
      <div id="reader" style="width:350px;margin:20px auto;"></div>

<script>

function test(){

    alert("1");

    document.getElementById("result").innerHTML = "";

    const scanner = new Html5Qrcode("reader");

    alert("2");

    scanner.start().catch(function(err){

    alert("3");
    alert(err);

    document.getElementById("result").innerHTML =
        "❌ " + err;

});

        { facingMode: "environment" },

        {
            fps: 10,
            qrbox: 250
        },

        function(decodedText){

            scanner.stop().then(function(){

                window.location.href =
                "https://script.google.com/macros/s/AKfycbwZ5FblfzjMXbZUeb0ZRLbpnIRWpK3fULj5kiUbJyzzlvjVUba51zKF0ceATs_KDFCH/exec?unit="
                + encodeURIComponent(decodedText);

            });

        },

        function(errorMessage){

            // לא עושים כלום בזמן חיפוש QR

        }

    ).catch(function(err){

        document.getElementById("result").innerHTML =
            "❌ " + err;

    });

}

</script>

</body>
</html>
